<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博占色 · 你的本命色</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e8dcc8;font-family:'PingFang SC','Microsoft YaHei',sans-serif;min-height:100dvh;transition:background 0.5s}
body.show-bg{background:url('assets/11.jpg') center/cover fixed no-repeat}

/* ─── 顶部标签 ─── */
.tabs{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:4px;padding:3px;background:rgba(20,20,20,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:50px;border:1px solid rgba(255,255,255,0.05)}
.tab{padding:8px 22px;border-radius:50px;font-size:13px;cursor:pointer;color:rgba(255,255,255,0.3);transition:all 0.3s;border:none;background:transparent;font-family:inherit;letter-spacing:0.04em}
.tab.active{background:rgba(201,169,110,0.1);color:#c9a96e}
.tab:hover{color:rgba(255,255,255,0.6)}

/* ─── 页面容器 ─── */
.page{display:none;width:100%;max-width:500px;margin:0 auto;padding:80px 20px 40px}
.page.active{display:block;animation:fadeIn 0.5s ease-out both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ─── 首页 ─── */
#page-home{display:none;min-height:100dvh;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px 40px;margin:0 auto;max-width:500px;text-align:center}
#page-home.active{display:flex}
.title{font-size:56px;letter-spacing:0.15em;color:#c9a96e;font-weight:300;margin-bottom:14px;line-height:1.2}
.title-sub{font-size:13px;color:rgba(255,255,255,0.2);letter-spacing:0.2em;margin-bottom:56px;font-weight:400}
.start-btn{padding:16px 52px;border-radius:50px;background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.25);color:#c9a96e;font-size:16px;font-family:inherit;cursor:pointer;letter-spacing:0.1em;transition:all 0.4s;position:relative}
.start-btn:hover{background:rgba(201,169,110,0.15);border-color:rgba(201,169,110,0.4);box-shadow:0 0 40px rgba(201,169,110,0.06)}

/* ─── 输入区 ─── */
.ci-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;max-width:360px;margin-left:auto;margin-right:auto}
.ci-label{font-size:14px;color:rgba(255,255,255,0.4);min-width:36px;letter-spacing:0.06em}
.ci-input{flex:1;padding:12px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e8dcc8;font-size:15px;font-family:inherit;outline:none;transition:border-color 0.3s}
.ci-input:focus{border-color:rgba(201,169,110,0.4)}
.ci-input::placeholder{color:rgba(255,255,255,0.15)}

/* ─── 题目 ─── */
.q-box{margin-bottom:22px;text-align:left;animation:fadeIn 0.4s ease-out both}
.q-text{font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:12px;letter-spacing:0.03em;line-height:1.6}
.q-num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;border-radius:50%;background:rgba(201,169,110,0.12);color:#c9a96e;font-size:12px;margin-right:8px}
.q-opt{display:block;width:100%;text-align:left;padding:12px 16px;margin-bottom:8px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:12px;color:rgba(255,255,255,0.5);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.25s}
.q-opt:hover{background:rgba(255,255,255,0.04);border-color:rgba(201,169,110,0.15)}
.q-opt.selected{background:rgba(201,169,110,0.08);border-color:rgba(201,169,110,0.3);color:#c9a96e}
.q-let{display:inline-block;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;border:1px solid rgba(255,255,255,0.12);font-size:11px;margin-right:12px;transition:all 0.25s}
.q-opt.selected .q-let{background:rgba(201,169,110,0.25);border-color:#c9a96e}

/* ─── 按钮 ─── */
.primary-btn{padding:14px 44px;border-radius:50px;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.3);color:#c9a96e;font-size:16px;font-family:inherit;cursor:pointer;letter-spacing:0.06em;transition:all 0.3s}
.primary-btn:hover{background:rgba(201,169,110,0.22);border-color:rgba(201,169,110,0.5)}
.primary-btn:disabled{opacity:0.3;cursor:default}
.sec-btn{padding:12px 28px;border-radius:50px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);font-size:14px;font-family:inherit;cursor:pointer;transition:all 0.25s}
.sec-btn:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.2)}

/* ─── 结果页 ─── */
#page-result .result-card{box-shadow:0 16px 64px rgba(0,0,0,0.5);margin-bottom:20px}
#page-result .result-info{background:rgba(10,10,10,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:#e8dcc8}
#page-result .result-info .ri-hex{color:rgba(255,255,255,0.35)}
#page-result .result-info .ri-desc{color:rgba(255,255,255,0.75)}
#page-result .result-info .ri-tag{color:rgba(201,169,110,0.8)}
#page-result .xy-section{background:rgba(10,10,10,0.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-color:rgba(201,169,110,0.15)}
#page-result .xy-section .xy-sub{color:rgba(255,255,255,0.4)}
#page-result .xy-section .xy-rel-desc{color:rgba(255,255,255,0.7)}
#page-result .xy-section .xy-types{color:rgba(255,255,255,0.35)}
#page-result .actions button{background:rgba(10,10,10,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.result-card{border-radius:24px;overflow:hidden;box-shadow:0 16px 64px rgba(0,0,0,0.5);margin-bottom:24px}
.result-color{height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:background 0.6s}
.result-color .rc-name{font-size:64px;font-weight:700;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,0.3);letter-spacing:0.1em}
.result-color .rc-type{font-size:18px;color:rgba(255,255,255,0.85);margin-top:8px;letter-spacing:0.06em;text-shadow:0 1px 6px rgba(0,0,0,0.3)}
.result-color .rc-poem{font-size:15px;color:rgba(255,255,255,0.6);margin-top:14px;font-style:italic}
.result-info{background:rgba(255,255,255,0.02);padding:20px 24px;border:1px solid rgba(255,255,255,0.05);border-top:none;border-radius:0 0 24px 24px}
.result-info .ri-hex{font-size:12px;color:rgba(255,255,255,0.2);font-family:monospace}
.result-info .ri-desc{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.8;margin-top:10px}
.result-info .ri-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.result-info .ri-tag{font-size:11px;padding:4px 12px;border-radius:50px;background:rgba(201,169,110,0.08);border:1px solid rgba(201,169,110,0.15);color:rgba(201,169,110,0.6);letter-spacing:0.04em}

.actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}

/* ─── 色缘 ─── */
.xy-section{display:none;margin-top:24px;padding:24px;border-radius:20px;border:1px solid rgba(201,169,110,0.1);background:rgba(201,169,110,0.02)}
.xy-section.show{display:block}
.xy-title{font-size:18px;color:#c9a96e;margin-bottom:8px;letter-spacing:0.06em}
.xy-sub{font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:16px}
.xy-row{display:flex;gap:10px}
.xy-row input{flex:1;padding:11px 16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#e8dcc8;font-size:14px;font-family:inherit;outline:none}
.xy-row button{padding:11px 24px;border-radius:12px;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.25);color:#c9a96e;font-size:14px;font-family:inherit;cursor:pointer}

.xy-result{margin-top:16px;display:none}
.xy-result.show{display:block;animation:fadeIn 0.5s ease-out both}
.xy-rel-name{font-size:22px;margin-bottom:8px}
.xy-rel-desc{font-size:14px;color:rgba(255,255,255,0.5);line-height:1.8}
.xy-balls{display:flex;justify-content:center;gap:20px;margin:16px 0}
.xy-ball{width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);transition:transform 0.3s}
.xy-ball:hover{transform:scale(1.1)}
.xy-types{font-size:12px;color:rgba(255,255,255,0.2);margin-bottom:12px}

/* ─── 响应式 ─── */
@media(max-width:480px){
  .result-color{height:220px}
  .result-color .rc-name{font-size:44px}
  .title{font-size:38px}
  body{padding:70px 12px 30px}
}
</style>
</head>

  </div><!-- /page-content -->
</div>

function switchPage(p){
  document.querySelectorAll('.page').forEach(function(el){el.classList.remove('active')});
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',(p==='home'&&i===0)||(p!=='home'&&i===1))});

  if(p==='quiz')renderQ();
}

// ─── 计算本命色 ───
function calcColor(){
  if(Object.keys(ans).length<5)return;
  var name=document.getElementById('q-name').value.trim();
  var birth=document.getElementById('q-birth').value.trim();

  var dims={};
  for(var qi=0;qi<5;qi++){
    var d=Q[qi].o[ans[qi]].d;
    for(var k in d)dims[k]=(dims[k]||0)+d[k];
  }
  var maxK=Object.keys(dims).sort(function(a,b){return(dims[b]||0)-(dims[a]||0)})[0];
  var ar;
  for(var i=0;i<AT.length;i++){if(AT[i].k===maxK){ar=AT[i];break;}}
  if(!ar)ar=AT[Math.floor(Math.random()*AT.length)];

  var seed=(name||'佚名')+'|'+(birth||'0101');
  var h=5381;for(var si=0;si<seed.length;si++)h=((h<<5)+h+seed.charCodeAt(si))&0x7fffffff;
  var cn=ar.c[h%ar.c.length];
  var co;
  for(var ci=0;ci<C.length;ci++){if(C[ci].n===cn){co=C[ci];break;}}
  if(!co)co=C[h%C.length];

  window._co=co;window._ar=ar;window._nm=name;window._br=birth;

  // 渲染结果
  document.getElementById('rc-color').style.background=co.h;
  document.getElementById('rc-name').textContent=co.n;
  document.getElementById('rc-type').textContent=ar.n;
  var p=(co.p||'').replace(/^「|」$/g,'');
  document.getElementById('rc-poem').textContent=p?'「'+p+'」':'';
  document.getElementById('ri-hex').textContent=co.h+' · RGB('+co.r+','+co.g+','+co.b+')'+(name?' · '+name:'')+(birth?' · '+birth:'');
  document.getElementById('ri-desc').textContent=ar.d;
  document.getElementById('ri-tags').innerHTML='<span class="ri-tag">🎨 '+co.n+'</span><span class="ri-tag">⭐ '+ar.n+'</span>';

  document.getElementById('xy-section').classList.add('show');
  document.getElementById('xy-name').value='';
  document.getElementById('xy-result').classList.remove('show');

  switchPage('result');
}

  if(!n){document.getElementById('xy-result').classList.remove('show');return;}

  var ar=window._ar;
  var h=5381,s=n+'|'+(window._br||'');
  for(var si=0;si<s.length;si++)h=((h<<5)+h+s.charCodeAt(si))&0x7fffffff;
  var oi=h%AT.length;
  var oa=AT[oi];
  if(oa.k===ar.k){oi=(oi+1)%AT.length;oa=AT[oi];}

  var key=ar.k+'_'+oa.k;
  var rev=oa.k+'_'+ar.k;
  var r=xyMap[key]||xyMap[rev]||['💫','奇妙的相遇','你们之间有一种说不清的吸引力——可能是天上的星星在排列组合的时候，特意把你们放在了彼此的方向。'];

  var oc=oa.c[h%oa.c.length];
  var oco;
  for(var ci=0;ci<C.length;ci++){if(C[ci].n===oc){oco=C[ci];break;}}
  var oh=oco?oco.h:'#666';

  document.getElementById('xy-result').innerHTML=
    '<div class="xy-rel-name">'+r[1]+' '+r[2]+'</div>'+
    '<div class="xy-balls"><div class="xy-ball" style="background:'+window._co.h+';box-shadow:0 0 20px rgba('+(window._co.r)+','+(window._co.g)+','+(window._co.b)+',0.3)"></div><div class="xy-ball" style="background:'+oh+';box-shadow:0 0 20px rgba('+(oco?oco.r:100)+','+(oco?oco.g:100)+','+(oco?oco.b:100)+',0.3)"></div></div>'+
    '<div class="xy-types">'+ar.n+' · '+oa.n+'</div>'+
    '<div class="xy-rel-desc">'+r[3]+'</div>';
  document.getElementById('xy-result').classList.add('show');
}

// ─── 分享卡片 ───
function genCard(){
  var co=window._co,ar=window._ar;
  if(!co||!ar)return;
  var W=1080,H=1440,ca=document.createElement('canvas');
  ca.width=W;ca.height=H;
  var ctx=ca.getContext('2d');
  ctx.fillStyle=co.h;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(255,255,255,0.08)';
  [[80,80],[W-140,80],[80,H-82],[W-140,H-82]].forEach(function(p){ctx.fillRect(p[0],p[1],60,2);ctx.fillRect(p[0],p[1]===80?p[1]+60:p[1]-60,2,60);});

  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,0.12)';ctx.font='14px sans-serif';ctx.fillText('· 赛 博 占 色 ·',W/2,128);

  ctx.fillStyle='#fff';ctx.font='bold 96px sans-serif';ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=24;ctx.fillText(co.n,W/2,380);ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='28px sans-serif';ctx.fillText(ar.n,W/2,460);
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(W/2-40,492,80,1);

  var p=(co.p||'').replace(/^「|」$/g,'');
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='22px sans-serif';ctx.fillText('「'+(p||'一色一世界')+'」',W/2,560);

  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='20px sans-serif';var d=ar.d;
  for(var i=0;i<d.length;i+=15)ctx.fillText(d.substring(i,Math.min(i+15,d.length)),W/2,640+(i/15)*34);

  var info=(window._nm||'')+(window._br?' · '+window._br:'');
  if(info){ctx.fillStyle='rgba(255,255,255,0.2)';ctx.font='18px sans-serif';ctx.fillText(info,W/2,H-260);}
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.font='16px sans-serif';ctx.fillText('我在这里测的 👇',W/2,H-190);
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='18px sans-serif';ctx.fillText('taiweixiao.com',W/2,H-150);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.font='12px monospace';ctx.fillText(co.h+'·RGB('+co.r+','+co.g+','+co.b+')',W/2,H-100);

  var link=document.createElement('a');link.download='赛博占色_'+co.n+'.png';link.href=ca.toDataURL('image/png');link.click();
}

// ─── 重测 ───
function resetAll(){
  ans={};
  document.getElementById('q-name').value='';
  document.getElementById('q-birth').value='';
  document.getElementById('xy-section').classList.remove('show');
  document.getElementById('xy-result').classList.remove('show');
  switchPage('quiz');
}
